    // ─── Workout Tracker ──────────────────────────────────────────────────────
    function WorkoutTracker({day,log,setLog,xp,setXp,prs,setPrs,onFinish,onExit}){
      const[weights,setWeights]=useState({});
      const[confettiKey,setConfettiKey]=useState(0);
      const[showConfetti,setShowConfetti]=useState(false);
      const[prBanner,setPrBanner]=useState(null);
      const dk=dateKey();
      const setW=(ex,s,val)=>setWeights(p=>({...p,[lk(ex,s,dk)]:val}));
      const getW=(ex,s)=>weights[lk(ex,s,dk)]!==undefined?weights[lk(ex,s,dk)]:(log[lk(ex,s,dk)]?.weight||"");
      const isDone=(ex,s)=>!!log[lk(ex,s,dk)]?.done;
      const bestEver=ex=>{const id=exId(ex);const ws=Object.entries(log).filter(([k,v])=>k.startsWith(id+"__")&&v.done&&v.weight).map(([,v])=>parseFloat(v.weight)).filter(n=>!isNaN(n));return ws.length?Math.max(...ws):null;};
      const toggleSet=(ex,s)=>{
        const k=lk(ex,s,dk);const w=getW(ex,s);const wasDone=isDone(ex,s);
        if(wasDone){setLog(p=>{const n={...p};delete n[k];return n;});return;}
        const best=bestEver(ex);const wNum=parseFloat(w)||0;const isPR=wNum>0&&(best===null||wNum>best);
        setLog(p=>({...p,[k]:{done:true,weight:w,date:dk}}));
        setXp(p=>p+XP.SET+(isPR?XP.PR:0));
        if(isPR){setPrs(p=>({...p,[exId(ex)]:wNum}));setPrBanner(ex.name);setConfettiKey(k=>k+1);setShowConfetti(true);setTimeout(()=>setShowConfetti(false),3000);}
        else{setConfettiKey(k=>k+1);setShowConfetti(true);setTimeout(()=>setShowConfetti(false),1800);}
      };
      const total=day.exercises.reduce((a,e)=>a+e.sets,0);
      const done=day.exercises.reduce((a,ex)=>a+Array.from({length:ex.sets},(_,s)=>isDone(ex,s)?1:0).reduce((x,y)=>x+y,0),0);
      const pct=total?~~(done/total*100):0;
      return(
        <div style={{position:"fixed",inset:0,background:BG,display:"flex",flexDirection:"column",zIndex:100,maxWidth:480,margin:"0 auto"}}>
          <Confetti go={showConfetti} key={confettiKey}/>
          <div style={{padding:"14px 18px 10px",borderBottom:`1px solid ${BORDER}`,flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div>
                <div style={{fontSize:10,letterSpacing:3,color:R,textTransform:"uppercase"}}>Active Workout</div>
                <div style={{fontSize:18,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:TXT}}>{day.focus}</div>
              </div>
              <button onClick={onExit} style={{fontSize:12,color:FAINT,background:DEEP,border:`1px solid ${BORDER}`,borderRadius:8,padding:"5px 12px",cursor:"pointer"}}>Exit</button>
            </div>
            <div style={{height:4,background:BORDER,borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:pct===100?`linear-gradient(90deg,${GREEN},#22C55E)`:`linear-gradient(90deg,${R},#E8525A)`,borderRadius:4,transition:"width .4s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              <span style={{fontSize:11,color:FAINT}}>{done}/{total} sets</span>
              <span style={{fontSize:11,fontWeight:700,color:pct===100?GREEN:R}}>{pct}%</span>
            </div>
            {prBanner&&<div style={{marginTop:8,padding:"7px 12px",background:"#FBBF2418",border:`1px solid ${GOLD}55`,borderRadius:10,display:"flex",alignItems:"center",gap:8,animation:"fadeUp .3s ease"}}>
              <span style={{fontSize:16}}>🏆</span><span style={{fontSize:12,fontWeight:700,color:GOLD}}>PR: {prBanner}!</span>
              <button onClick={()=>setPrBanner(null)} style={{marginLeft:"auto",fontSize:11,color:FAINT,background:"none",border:"none",cursor:"pointer"}}>✕</button>
            </div>}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px 24px"}}>
            {day.exercises.map((ex,ei)=>{
              const best=bestEver(ex);
              const allDone=Array.from({length:ex.sets},(_,s)=>isDone(ex,s)).every(Boolean);
              const isLifting=!!(ex.suggestedWeight&&ex.suggestedWeight.trim()&&ex.suggestedWeight!=="");
              return(
                <div key={ei} style={{background:allDone?`${GREEN}0A`:CARD,border:`1px solid ${allDone?GREEN+"33":BORDER}`,borderRadius:14,padding:"13px 14px",marginBottom:10,transition:"all .3s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",color:allDone?GREEN:TXT}}>{ex.name} {allDone&&"✓"}</div>
                      <div style={{fontSize:12,color:R,marginTop:1}}>{ex.sets>1?`${ex.sets} × `:""}{ex.reps}</div>
                    </div>
                    {isLifting&&best!==null&&<div style={{textAlign:"right"}}><div style={{fontSize:9,color:FAINT,textTransform:"uppercase",letterSpacing:1}}>Best</div><div style={{fontSize:15,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:GREEN}}>{best} lbs</div></div>}
                  </div>
                  {ex.suggestedWeight&&isLifting&&<div style={{fontSize:11.5,color:FAINT,background:DEEP,borderRadius:8,padding:"6px 10px",marginBottom:8}}>💡 {ex.suggestedWeight}</div>}
                  {ex.note&&<div style={{fontSize:11.5,color:FAINT,marginBottom:8}}>📌 {ex.note}</div>}
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    {Array.from({length:ex.sets},(_,s)=>{
                      const done=isDone(ex,s);const w=getW(ex,s);
                      const setLabel=ex.sets===1?"Complete":`Set ${s+1}`;
                      return(
                        <div key={s} style={{display:"flex",gap:8,alignItems:"center"}}>
                          <span style={{fontSize:12,color:FAINT,width:44,flexShrink:0}}>{setLabel}</span>
                          {isLifting&&<input type="number" placeholder="lbs" value={w} onChange={e=>setW(ex,s,e.target.value)}
                            style={{width:68,background:done?`${GREEN}18`:DEEP,border:`1px solid ${done?GREEN+"55":BORDER}`,borderRadius:9,padding:"7px 10px",color:TXT,fontSize:14,outline:"none",fontFamily:"inherit",transition:"all .2s"}}/>}
                          <button onClick={()=>toggleSet(ex,s)}
                            style={{flex:1,padding:"8px 0",borderRadius:9,border:`1.5px solid ${done?GREEN:BORDER}`,background:done?`${GREEN}18`:"transparent",color:done?GREEN:FAINT,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:done?700:400,transition:"all .18s"}}>
                            {done?"✓ Done":"Mark Done"}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {pct===100&&(
              <button onClick={()=>{setXp(p=>p+XP.WORKOUT);onFinish();}}
                style={{width:"100%",padding:"16px 0",borderRadius:14,background:`linear-gradient(135deg,${GREEN},#22C55E)`,color:"#0F1014",border:"none",fontSize:17,fontWeight:800,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5,boxShadow:`0 4px 24px ${GREEN}44`,marginTop:4}}>
                🎉 Finish Workout (+{XP.WORKOUT} XP)
              </button>
            )}
          </div>
        </div>
      );
    }

    // ─── Dashboard Tab ────────────────────────────────────────────────────────
    function DashboardTab({plan,log,xp,bwLog,setBwLog,setXp,onBeginWorkout,onChatFocus,today}){
      const[bwInp,setBwInp]=useState("");
      const todayPlan=plan.weeklySchedule?.find(d=>d.day===today);
      const isRest=!todayPlan?.exercises?.length;
      const dk=dateKey();
      const streak=(()=>{let s=0;const d=new Date();for(let i=0;i<60;i++){const k=d.toISOString().slice(0,10);const worked=Object.keys(log).some(l=>l.includes(`__${k}__`)&&log[l].done);if(worked)s++;else if(i>0)break;d.setDate(d.getDate()-1);}return s;})();
      const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay());
      const workoutDays=plan.weeklySchedule?.filter(d=>d.exercises?.length>0)||[];
      const doneThisWeek=workoutDays.filter(d=>{const di=DAYS.indexOf(d.day);const dd=new Date(weekStart);dd.setDate(weekStart.getDate()+di);const k=dd.toISOString().slice(0,10);return Object.keys(log).some(l=>l.includes(`__${k}__`)&&log[l].done);}).length;
      const weekPct=workoutDays.length?doneThisWeek/workoutDays.length:0;
      const lastWorkout=(()=>{const dates=[...new Set(Object.keys(log).map(k=>k.split("__")[1]))].sort().reverse();for(const dt of dates){if(dt===dk)continue;const d=new Date(dt);const dayN=DAYS[d.getDay()];const dp=plan.weeklySchedule?.find(p=>p.day===dayN);if(dp?.exercises?.length)return{date:dt,day:dayN,focus:dp.focus};}return null;})();
      const total=todayPlan?.exercises?.reduce((a,ex)=>a+ex.sets,0)||0;
      const done=todayPlan?.exercises?.reduce((a,ex)=>a+Array.from({length:ex.sets},(_,s)=>log[lk(ex,s,dk)]?.done?1:0).reduce((x,y)=>x+y,0),0)||0;
      const level=Math.floor(xp/500)+1;const levelXp=xp%500;const levelPct=levelXp/500*100;
      const tomorrowIdx=(DAYS.indexOf(today)+1)%7;const tomorrowName=DAYS[tomorrowIdx];
      const tomorrowPlan=plan.weeklySchedule?.find(d=>d.day===tomorrowName);
      const logBW=()=>{const v=parseFloat(bwInp);if(isNaN(v)||v<=0)return;const isNew=!bwLog[dk];setBwLog(p=>({...p,[dk]:v}));if(isNew)setXp(p=>p+XP.BODYWEIGHT);setBwInp("");};
      return(
        <div style={{animation:"fadeUp .22s ease"}}>
          <div style={{background:CARD,borderRadius:13,padding:"13px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${GOLD},#F59E0B)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
                <div><div style={{fontSize:10,color:FAINT,textTransform:"uppercase",letterSpacing:1.5}}>Level {level}</div><div style={{fontSize:16,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:GOLD}}>{xp.toLocaleString()} XP</div></div>
              </div>
              <div style={{textAlign:"right"}}><div style={{fontSize:10,color:FAINT}}>next level</div><div style={{fontSize:13,color:DIM}}>{500-levelXp} XP away</div></div>
            </div>
            <div style={{height:5,background:DEEP,borderRadius:5,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${levelPct}%`,background:`linear-gradient(90deg,${GOLD},#F59E0B)`,borderRadius:5,transition:"width .6s ease"}}/>
            </div>
            <div style={{fontSize:10,color:FAINT,marginTop:5,lineHeight:1.6}}>+{XP.SET} XP/set · +{XP.WORKOUT} finish workout · +{XP.PR} PR · +{XP.BODYWEIGHT} log weight · +{XP.NUTRITION_DAY} log macros</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
            <div style={{background:CARD,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
              <div style={{fontSize:22}}>{streak>0?"🔥":"💤"}</div>
              <div style={{fontSize:24,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:streak>0?R:FAINT,lineHeight:1}}>{streak}</div>
              <div style={{fontSize:10,color:FAINT,marginTop:2}}>day streak</div>
            </div>
            <div style={{background:CARD,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
              <div style={{position:"relative",width:46,height:46,margin:"0 auto 2px"}}>
                <svg width="46" height="46" style={{transform:"rotate(-90deg)"}}>
                  <circle cx="23" cy="23" r="18" fill="none" stroke={BORDER} strokeWidth="4"/>
                  <circle cx="23" cy="23" r="18" fill="none" stroke={GREEN} strokeWidth="4" strokeDasharray={2*Math.PI*18} strokeDashoffset={2*Math.PI*18*(1-weekPct)} strokeLinecap="round" style={{transition:"stroke-dashoffset .6s ease"}}/>
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:GREEN}}>{doneThisWeek}/{workoutDays.length}</div>
              </div>
              <div style={{fontSize:10,color:FAINT}}>this week</div>
            </div>
            <div style={{background:CARD,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
              <div style={{fontSize:20,marginBottom:2}}>📅</div>
              <div style={{fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:TXT,lineHeight:1.2}}>{lastWorkout?.day||"—"}</div>
              <div style={{fontSize:10,color:FAINT,marginTop:2,lineHeight:1.3}}>{lastWorkout?.focus?.split("—")[0]?.trim()||"No log yet"}</div>
            </div>
          </div>
          <div style={{background:isRest?DEEP:CARD,border:`1px solid ${isRest?BORDER:"#CE202933"}`,borderRadius:13,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:isRest?0:10}}>
              <div>
                <div style={{fontSize:11,color:FAINT,marginBottom:2}}>Today · {today}</div>
                <div style={{fontSize:17,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:isRest?FAINT:TXT}}>{todayPlan?.focus||"Rest Day"}</div>
              </div>
              {isRest?<span style={{fontSize:28}}>💤</span>:<span style={{fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:done>0&&done===total?GREEN:R}}>{done}/{total} sets</span>}
            </div>
            {!isRest&&<>
              <div style={{height:4,background:DEEP,borderRadius:4,overflow:"hidden",marginBottom:10}}>
                <div style={{height:"100%",width:`${total?~~(done/total*100):0}%`,background:done===total?`linear-gradient(90deg,${GREEN},#22C55E)`:`linear-gradient(90deg,${R},#E8525A)`,borderRadius:4,transition:"width .4s"}}/>
              </div>
              <button onClick={onBeginWorkout} style={{width:"100%",padding:"12px 0",borderRadius:11,background:done===total?`${GREEN}22`:R,border:done===total?`1px solid ${GREEN}55`:"none",color:done===total?GREEN:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.3}}>
                {done===total?"Workout Complete ✓":done>0?"Resume Workout →":"Begin Today's Workout →"}
              </button>
            </>}
          </div>
          <button onClick={onChatFocus} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#CE202912",border:`1px solid #CE202933`,borderRadius:13,cursor:"pointer",marginBottom:10,textAlign:"left"}}>
            <Av sz={32}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:TXT}}>Ask Nova anything</div><div style={{fontSize:11,color:FAINT,marginTop:1}}>Tips, form, motivation…</div></div>
            <span style={{fontSize:16,color:R}}>→</span>
          </button>
          <div style={{background:CARD,borderRadius:13,padding:"13px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:10,color:FAINT,textTransform:"uppercase",letterSpacing:1.5}}>⚖️ Bodyweight Log</div>
              <div style={{fontSize:10,color:GOLD}}>+{XP.BODYWEIGHT} XP/day</div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <input type="number" value={bwInp} onChange={e=>setBwInp(e.target.value)} placeholder="lbs" style={{flex:1,background:DEEP,border:`1px solid ${BORDER}`,borderRadius:9,padding:"9px 12px",color:TXT,fontSize:15,outline:"none",fontFamily:"inherit"}} onKeyDown={e=>e.key==="Enter"&&logBW()}/>
              <button onClick={logBW} style={{padding:"9px 18px",borderRadius:9,background:R,color:"#fff",border:"none",fontSize:13,fontWeight:700,cursor:"pointer"}}>{bwLog[dk]?"Update":"Log"}</button>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.entries(bwLog).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).map(([dt,w])=><div key={dt} style={{background:DEEP,borderRadius:7,padding:"4px 10px",fontSize:12}}><span style={{color:TXT,fontWeight:600}}>{w} lbs</span><span style={{color:FAINT,marginLeft:5}}>{dt.slice(5)}</span></div>)}
              {Object.keys(bwLog).length===0&&<span style={{fontSize:12,color:FAINT}}>No entries yet</span>}
            </div>
          </div>
          {tomorrowPlan&&<div style={{background:DEEP,border:`1px solid ${BORDER}`,borderRadius:13,padding:"12px 14px"}}>
            <div style={{fontSize:10,color:FAINT,textTransform:"uppercase",letterSpacing:1.5,marginBottom:5}}>Tomorrow · {tomorrowName}</div>
            <div style={{fontSize:15,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:tomorrowPlan.exercises?.length?DIM:FAINT}}>{tomorrowPlan.focus}</div>
            {tomorrowPlan.exercises?.length>0&&<div style={{fontSize:11,color:FAINT,marginTop:3}}>{tomorrowPlan.exercises.length} exercises</div>}
          </div>}
        </div>
      );
    }

    // ─── Workouts Tab ─────────────────────────────────────────────────────────
    function WorkoutsTab({plan,log,prs,today,onBeginWorkout}){
      const[open,setOpen]=useState(null);
      const dk=dateKey();
      const bestEver=ex=>{const id=exId(ex);const ws=Object.entries(log).filter(([k,v])=>k.startsWith(id+"__")&&v.done&&v.weight).map(([,v])=>parseFloat(v.weight)).filter(n=>!isNaN(n));return ws.length?Math.max(...ws):null;};
      return(
        <div style={{animation:"fadeUp .22s ease"}}>
          {plan.weeklySchedule?.map((day,i)=>{
            const rest=!day.exercises?.length;const isToday=day.day===today;const isOpen=open===i;
            const todayDone=isToday?day.exercises?.reduce((a,ex)=>a+Array.from({length:ex.sets},(_,s)=>log[lk(ex,s,dk)]?.done?1:0).reduce((x,y)=>x+y,0),0)||0:0;
            const todayTotal=isToday?day.exercises?.reduce((a,ex)=>a+ex.sets,0)||0:0;
            return(
              <div key={i} style={{marginBottom:8,borderRadius:13,overflow:"hidden",border:`1px solid ${isToday?"#CE202955":rest?DEEP:BORDER}`,background:isToday?"#CE202909":rest?DEEP:CARD}}>
                <button onClick={()=>!rest&&setOpen(isOpen?null:i)} style={{width:"100%",display:"flex",alignItems:"center",gap:11,padding:"12px 13px",background:"transparent",border:"none",cursor:rest?"default":"pointer",textAlign:"left",fontFamily:"inherit"}}>
                  <div style={{width:38,height:38,borderRadius:9,background:rest?"#2C2D35":isToday?"#CE202922":"#1E1F27",border:`1px solid ${rest?BORDER:isToday?"#CE202966":BORDER}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>{rest?"💤":isToday?"⚡":"🔥"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",color:rest?FAINT:isToday?R:TXT}}>{day.day}{isToday&&<span style={{fontSize:10,color:R,marginLeft:6,fontWeight:400}}>Today</span>}</div>
                    <div style={{fontSize:12,color:rest?FAINT:DIM,marginTop:1}}>{day.focus}</div>
                  </div>
                  {isToday&&!rest&&<div style={{textAlign:"right",marginRight:4}}><div style={{fontSize:12,color:todayDone===todayTotal&&todayTotal>0?GREEN:R,fontWeight:700}}>{todayDone}/{todayTotal}</div><div style={{fontSize:10,color:FAINT}}>sets</div></div>}
                  {!rest&&<span style={{fontSize:12,color:FAINT,marginLeft:4}}>{isOpen?"▴":"▾"}</span>}
                </button>
                {isOpen&&(
                  <div style={{background:DEEP,borderTop:`1px solid ${BORDER}`}}>
                    <div style={{padding:"10px 13px",borderBottom:`1px solid ${BORDER}`}}>
                      <button onClick={()=>onBeginWorkout(day)} style={{width:"100%",padding:"11px 0",borderRadius:10,background:R,color:"#fff",border:"none",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                        {isToday?(todayDone>0?"Resume Workout →":"Begin Today's Workout →"):`Begin ${day.day}'s Workout →`}
                      </button>
                    </div>
                    {day.exercises.map((ex,j)=>{
                      const b=bestEver(ex);const isPR=b!==null&&prs[exId(ex)]===b;
                      return(
                        <div key={j} style={{padding:"11px 13px",borderBottom:j<day.exercises.length-1?`1px solid ${BORDER}`:"none"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div style={{fontSize:14,fontWeight:600,color:TXT}}>{ex.name}</div>
                            {b!==null&&<div style={{display:"flex",alignItems:"center",gap:5}}>{isPR&&<span style={{fontSize:13}}>🏆</span>}<span style={{fontSize:14,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:GREEN}}>{b} lbs</span></div>}
                          </div>
                          <div style={{fontSize:12,color:R,marginTop:2}}>{ex.sets} sets × {ex.reps}</div>
                          {ex.suggestedWeight&&<div style={{fontSize:11.5,color:FAINT,marginTop:3}}>💡 {ex.suggestedWeight}</div>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── Nutrition Tab ────────────────────────────────────────────────────────
    function NutritionTab({plan,nutLog,setNutLog,xp,setXp}){
      const CAL_GOAL=parseFloat(plan.nutrition?.calories)||2000;
      const PROTEIN_GOAL=parseFloat(plan.nutrition?.protein)||150;
      const CARB_GOAL=parseFloat(plan.nutrition?.carbs)||200;
      const FAT_GOAL=parseFloat(plan.nutrition?.fat)||60;
      const WATER_GOAL=120;
      const dk=dateKey();
      const[foodItems,setFoodItems]=useLS("nv6_fitems",{});
      const[favFoods,setFavFoods]=useLS("nv6_favfoods",[]);
      const items=foodItems[dk]||[];
      const awardedRef=useRef(false);

      const setItems=newItems=>{
        const updated=typeof newItems==="function"?newItems(items):newItems;
        setFoodItems(p=>({...p,[dk]:updated}));
        const cal=updated.reduce((s,i)=>s+i.calories,0);
        setNutLog(p=>({...p,[dk]:{
          calories:String(Math.round(cal)),
          protein:String(Math.round(updated.reduce((s,i)=>s+i.protein,0)*10)/10),
          carbs:String(Math.round(updated.reduce((s,i)=>s+i.carbs,0)*10)/10),
          fat:String(Math.round(updated.reduce((s,i)=>s+i.fat,0)*10)/10),
        }}));
        if(cal>=CAL_GOAL*0.8&&!awardedRef.current&&!nutLog[dk+"_xp"]){
          awardedRef.current=true;setXp(p=>p+XP.NUTRITION_DAY);
          setNutLog(p=>({...p,[dk+"_xp"]:true}));
        }
      };

      // ── Favorites helpers ──
      const isFav=item=>favFoods.some(f=>f.name===item.name);
      const toggleFav=item=>{
        if(isFav(item))setFavFoods(favFoods.filter(f=>f.name!==item.name));
        else setFavFoods([...favFoods,{name:item.name,calories:item.calories,protein:item.protein,carbs:item.carbs,fat:item.fat,water:item.water}]);
      };
      const addFav=fav=>setItems([...items,{id:Date.now(),...fav,time:nowTime()}]);

      const[showForm,setShowForm]=useState(false);
      const[mode,setMode]=useState("smart");
      const[smartInput,setSmartInput]=useState("");
      const[loading,setLoading]=useState(false);
      const[err,setErr]=useState("");
      const[preview,setPreview]=useState(null);
      const[iname,setIname]=useState("");
      const[ical,setIcal]=useState("");
      const[iprot,setIprot]=useState("");
      const[icarb,setIcarb]=useState("");
      const[ifat,setIfat]=useState("");
      const[iwat,setIwat]=useState("");
      const[editId,setEditId]=useState(null);
      const[camStatus,setCamStatus]=useState("idle"); // idle | scanning | done
      const smartRef=useRef(null);
      const nameRef=useRef(null);
      const photoInputRef=useRef(null);
      const barcodeInputRef=useRef(null);

      const totalCal=items.reduce((s,i)=>s+i.calories,0);
      const totalWater=items.reduce((s,i)=>s+i.water,0);
      const totalProtein=items.reduce((s,i)=>s+i.protein,0);
      const totalCarbs=items.reduce((s,i)=>s+i.carbs,0);
      const totalFat=items.reduce((s,i)=>s+i.fat,0);
      const pct=(v,g)=>Math.min(100,(v/g)*100);

      useEffect(()=>{
        if(showForm&&mode==="smart"&&smartRef.current)smartRef.current.focus();
        if(showForm&&mode==="manual"&&nameRef.current)nameRef.current.focus();
      },[showForm,mode]);

      const nowTime=()=>{const h=new Date().getHours();return h<12?"Morning":h<17?"Afternoon":"Evening";};
      const resetForm=()=>{
        setIname("");setIcal("");setIprot("");setIcarb("");setIfat("");setIwat("");
        setSmartInput("");setPreview(null);setErr("");setEditId(null);setShowForm(false);
        setLoading(false);setCamStatus("idle");
      };

      const SYS_NUT=`You are a nutrition lookup tool. Given a food or drink item, return ONLY a raw JSON object: {"name":"...","calories":0,"protein":0.0,"carbs":0.0,"fat":0.0,"water":0.0}. water is fluid oz for beverages only, 0 for solid food. No markdown, no code fences, just JSON.`;

      const handleSmartLookup=async()=>{
        if(!smartInput.trim())return;
        setLoading(true);setErr("");setPreview(null);
        try{const raw=await ask([{role:"user",content:smartInput.trim()}],SYS_NUT,300);setPreview(parseJSON(raw));}
        catch{setErr("Couldn't look that up — try again or use manual.");}
        setLoading(false);
      };

      // ── Camera / Barcode capture ──
      const handleCapture=async(e,captureMode)=>{
        const file=e.target.files?.[0];if(!file)return;
        e.target.value="";
        setCamStatus("scanning");setErr("");setPreview(null);setLoading(true);
        try{
          const dataUrl=await resizeImg(file,900,0.82);
          const b64=dataUrl.split(",")[1];
          const mt="image/jpeg";
          if(captureMode==="barcode"){
            // Step 1 – ask Claude to read any barcode in the image
            const barcodeResp=await askVision(b64,mt,
              "Look at this image. If there is a UPC or EAN barcode visible, return ONLY the numeric barcode number (8–14 digits). If no barcode, return the word NONE.",
              120
            );
            const code=barcodeResp.trim().replace(/\D/g,"");
            if(code.length>=8){
              // Step 2 – look up Open Food Facts
              try{
                const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                const d=await r.json();
                if(d.status===1&&d.product){
                  const p=d.product,n=p.nutriments||{};
                  const sv=k=>n[k+"_serving"]!=null?n[k+"_serving"]:(n[k+"_100g"]||0);
                  setPreview({name:p.product_name||p.brands||"Product",
                    calories:Math.round(sv("energy-kcal")),
                    protein:Math.round(sv("proteins")*10)/10,
                    carbs:Math.round(sv("carbohydrates")*10)/10,
                    fat:Math.round(sv("fat")*10)/10,water:0});
                  setCamStatus("done");setLoading(false);return;
                }
              }catch{}
            }
            // Fallback – let Claude read the label visually
            const raw=await askVision(b64,mt,
              'This is a food product label. Extract the nutrition facts per serving. Return ONLY JSON: {"name":"","calories":0,"protein":0,"carbs":0,"fat":0,"water":0}',
              400
            );
            setPreview(parseJSON(raw));
          }else{
            // Photo of meal – estimate calories
            const raw=await askVision(b64,mt,
              'Identify the food or meal in this photo and estimate the nutrition for a typical serving. Return ONLY JSON: {"name":"","calories":0,"protein":0,"carbs":0,"fat":0,"water":0}. water is fluid oz only for drinks, otherwise 0.',
              400
            );
            setPreview(parseJSON(raw));
          }
          setCamStatus("done");
        }catch(e){setErr("Couldn't read that — try again or enter manually.");setCamStatus("idle");}
        setLoading(false);
      };

      const confirmPreview=()=>{
        if(!preview)return;
        setItems([...items,{id:Date.now(),...preview,time:nowTime()}]);resetForm();
      };

      const addItem=()=>{
        if(!iname.trim())return;
        const entry={name:iname.trim(),calories:Number(ical)||0,protein:Number(iprot)||0,carbs:Number(icarb)||0,fat:Number(ifat)||0,water:Number(iwat)||0};
        if(editId!==null)setItems(items.map(i=>i.id===editId?{...i,...entry}:i));
        else setItems([...items,{id:Date.now(),...entry,time:nowTime()}]);
        resetForm();
      };

      const removeItem=id=>setItems(items.filter(i=>i.id!==id));
      const startEdit=item=>{
        setIname(item.name);setIcal(item.calories.toString());setIprot(item.protein.toString());
        setIcarb(item.carbs.toString());setIfat(item.fat.toString());setIwat(item.water.toString());
        setEditId(item.id);setMode("manual");setShowForm(true);
      };

      const MacBar=({label,value,goal,color,unit="g"})=>(
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:9,letterSpacing:1.5,color:FAINT,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{label}</span>
            <span style={{fontSize:11,color,fontWeight:700}}>{Math.round(value*10)/10}{unit}</span>
          </div>
          <div style={{height:3,background:DEEP,borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct(value,goal)}%`,background:pct(value,goal)>=100?GREEN:color,borderRadius:2,transition:"width .4s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:FAINT,marginTop:3}}>
            <span style={{color:pct(value,goal)>=100?GREEN:FAINT}}>{Math.round(pct(value,goal))}%</span>
            <span>/{goal}{unit}</span>
          </div>
        </div>
      );

      const inpStyle=()=>({width:"100%",background:DEEP,border:`1px solid ${BORDER}`,borderRadius:9,padding:"9px 12px",color:TXT,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"});

      // shared preview card (used by Smart Add, Photo, and Barcode modes)
      const PreviewCard=()=>preview?(
        <div style={{background:DEEP,borderRadius:10,padding:14,border:`1px solid ${BORDER}`,marginBottom:10,animation:"fadeUp .2s ease"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:10,color:TXT}}>{preview.name}</div>
          {[["Calories",preview.calories,GOLD," cal"],["Protein",preview.protein,GREEN,"g"],["Carbs",preview.carbs,BLUE,"g"],["Fat",preview.fat,PURPLE,"g"],preview.water>0&&["Fluid",preview.water,BLUE," oz"]].filter(Boolean).map(([l,v,c,u])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
              <span style={{fontSize:12,color:DIM}}>{l}</span>
              <span style={{fontSize:12,color:c,fontWeight:700}}>{v}{u}</span>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button onClick={()=>{setPreview(null);setSmartInput("");setCamStatus("idle");}} style={{flex:1,padding:"10px",background:DEEP,border:`1px solid ${BORDER}`,borderRadius:9,color:DIM,fontSize:12,fontFamily:"inherit",cursor:"pointer"}}>Redo</button>
            <button onClick={confirmPreview} style={{flex:1,padding:"10px",background:R,border:"none",borderRadius:9,color:"#fff",fontSize:12,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>✓ Add</button>
          </div>
        </div>
      ):null;

      return(
        <div style={{animation:"fadeUp .22s ease"}}>
          {plan.nutrition?.notes&&(
            <div style={{background:"#CE202912",border:`1px solid #CE202933`,borderRadius:13,padding:"12px 14px",marginBottom:14,display:"flex",gap:10,alignItems:"center"}}>
              <Av sz={28}/><div style={{flex:1,fontSize:13,color:DIM,lineHeight:1.6}}>{plan.nutrition.notes}</div>
              <div style={{fontSize:10,color:GOLD,textAlign:"right",flexShrink:0}}>+{XP.NUTRITION_DAY} XP<br/>at 80%</div>
            </div>
          )}

          {/* ── Calorie summary ── */}
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <div style={{flex:1,background:CARD,borderRadius:12,padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:7}}>
                <span style={{fontSize:9,letterSpacing:2,color:FAINT,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>Calories</span>
                <span style={{fontSize:16,color:GOLD,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>{Math.round(totalCal)}</span>
              </div>
              <div style={{height:5,background:DEEP,borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct(totalCal,CAL_GOAL)}%`,background:pct(totalCal,CAL_GOAL)>=100?R:`linear-gradient(90deg,${GOLD},#E8C96A)`,borderRadius:3,transition:"width .4s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:FAINT,marginTop:3}}>
                <span style={{color:pct(totalCal,CAL_GOAL)>=100?R:FAINT}}>{Math.round(pct(totalCal,CAL_GOAL))}%</span>
                <span>/{CAL_GOAL}</span>
              </div>
            </div>
            <div style={{flex:1,background:CARD,borderRadius:12,padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:7}}>
                <span style={{fontSize:9,letterSpacing:2,color:FAINT,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>Water</span>
                <span style={{fontSize:16,color:BLUE,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>{totalWater} oz</span>
              </div>
              <div style={{height:5,background:DEEP,borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct(totalWater,WATER_GOAL)}%`,background:`linear-gradient(90deg,#3a7abd,${BLUE})`,borderRadius:3,transition:"width .4s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:FAINT,marginTop:3}}>
                <span>{Math.round(pct(totalWater,WATER_GOAL))}%</span>
                <span>/{WATER_GOAL} oz</span>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:12,padding:"13px 14px",background:CARD,borderRadius:12,border:`1px solid ${BORDER}`}}>
            <MacBar label="Protein" value={totalProtein} goal={PROTEIN_GOAL} color={GREEN}/>
            <MacBar label="Carbs" value={totalCarbs} goal={CARB_GOAL} color={BLUE}/>
            <MacBar label="Fat" value={totalFat} goal={FAT_GOAL} color={PURPLE}/>
          </div>

          {/* ── Food item list ── */}
          <div style={{marginBottom:10}}>
            {items.map(item=>(
              <div key={item.id} style={{display:"flex",alignItems:"flex-start",padding:"12px 0",borderBottom:`1px solid ${BORDER}`,animation:"fadeUp .22s ease"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:500,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:TXT}}>{item.name}</div>
                  <div style={{display:"flex",gap:8,fontSize:11,flexWrap:"wrap"}}>
                    <span style={{color:FAINT}}>{item.time}</span>
                    {item.calories>0&&<span style={{color:GOLD}}>{item.calories} cal</span>}
                    {item.protein>0&&<span style={{color:GREEN}}>P {item.protein}g</span>}
                    {item.carbs>0&&<span style={{color:BLUE}}>C {item.carbs}g</span>}
                    {item.fat>0&&<span style={{color:PURPLE}}>F {item.fat}g</span>}
                    {item.water>0&&<span style={{color:BLUE}}>{item.water} oz 💧</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:2,flexShrink:0,marginTop:2,alignItems:"center"}}>
                  {/* ★ favourite toggle */}
                  <button onClick={()=>toggleFav(item)} title={isFav(item)?"Remove from favourites":"Save to favourites"}
                    style={{background:"none",border:"none",color:isFav(item)?GOLD:FAINT,cursor:"pointer",fontSize:16,padding:"4px",lineHeight:1,transition:"color .15s"}}>
                    {isFav(item)?"★":"☆"}
                  </button>
                  <button onClick={()=>startEdit(item)} style={{background:"none",border:"none",color:FAINT,cursor:"pointer",fontSize:14,padding:"4px"}}>✎</button>
                  <button onClick={()=>removeItem(item.id)} style={{background:"none",border:"none",color:FAINT,cursor:"pointer",fontSize:16,padding:"4px"}}>×</button>
                </div>
              </div>
            ))}
            {items.length===0&&<div style={{fontSize:12,color:FAINT,textAlign:"center",padding:"20px 0"}}>Nothing logged yet — add your first item below</div>}
          </div>

          {/* ── Add form ── */}
          {showForm?(
            <div style={{background:CARD,borderRadius:13,padding:18,marginBottom:12,border:`1px solid ${BORDER}`}}>

              {/* mode tabs — hidden when editing an existing item */}
              {editId===null&&(
                <div style={{display:"flex",marginBottom:14,background:DEEP,borderRadius:9,padding:3,gap:2}}>
                  {[["smart","✦ Smart"],["photo","📷 Photo"],["barcode","〠 Scan"],["manual","Manual"]].map(([m,label])=>(
                    <button key={m} onClick={()=>{setMode(m);setPreview(null);setErr("");setCamStatus("idle");}}
                      style={{flex:1,padding:"7px 4px",background:mode===m?CARD:"transparent",border:"none",borderRadius:7,
                        color:mode===m?(m==="smart"?R:TXT):FAINT,fontSize:10,fontFamily:"inherit",cursor:"pointer",
                        fontWeight:mode===m?700:400,transition:"all .2s",whiteSpace:"nowrap"}}>
                      {label}
                    </button>
                  ))}
                </div>
              )}

              {/* ── Smart Add ── */}
              {(mode==="smart"&&editId===null)&&(
                <>
                  {/* Favourites quick-add row */}
                  {favFoods.length>0&&(
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:9,color:GOLD,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>★ Saved</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {favFoods.map((f,i)=>(
                          <button key={i} onClick={()=>addFav(f)}
                            style={{padding:"5px 11px",borderRadius:20,background:DEEP,border:`1px solid ${GOLD}44`,color:GOLD,fontSize:12,fontFamily:"inherit",cursor:"pointer",transition:"all .15s"}}
                            onMouseEnter={e=>{e.currentTarget.style.background="#FBBF2418";}}
                            onMouseLeave={e=>{e.currentTarget.style.background=DEEP;}}>
                            + {f.name}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                  <div style={{position:"relative",marginBottom:10}}>
                    <input ref={smartRef} value={smartInput} onChange={e=>{setSmartInput(e.target.value);setPreview(null);setErr("");}} placeholder='e.g. "grilled chicken 6oz" or "20oz water"' onKeyDown={e=>{if(e.key==="Enter"&&!loading){e.preventDefault();handleSmartLookup();}}} disabled={loading} style={{...inpStyle(),paddingRight:60,opacity:loading?.6:1}}/>
                    <button onClick={handleSmartLookup} disabled={loading||!smartInput.trim()} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:smartInput.trim()?R:BORDER,border:"none",borderRadius:7,padding:"6px 12px",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"inherit",cursor:smartInput.trim()?"pointer":"default",transition:"background .2s"}}>{loading?"···":"Go"}</button>
                  </div>
                  {loading&&<div style={{textAlign:"center",padding:"12px 0",fontSize:12,color:DIM}}>Looking up nutrition...</div>}
                  {err&&<div style={{padding:"9px 12px",background:"#CE202914",borderRadius:8,border:`1px solid #CE202933`,fontSize:12,color:R,marginBottom:10}}>{err}</div>}
                  <PreviewCard/>
                  <button onClick={resetForm} style={{width:"100%",padding:"10px",background:DEEP,border:`1px solid ${BORDER}`,borderRadius:9,color:FAINT,fontSize:12,fontFamily:"inherit",cursor:"pointer"}}>Cancel</button>
                </>
              )}

              {/* ── Photo mode ── */}
              {(mode==="photo"&&editId===null)&&(
                <div>
                  {camStatus==="idle"&&!preview&&(
                    <div style={{textAlign:"center",padding:"16px 0 10px"}}>
                      <div style={{fontSize:13,color:DIM,marginBottom:16,lineHeight:1.6}}>Take or import a photo of your meal — Nova will identify it and estimate the nutrition.</div>
                      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                        <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"14px 20px",background:DEEP,border:`1.5px solid ${BORDER}`,borderRadius:12,cursor:"pointer",transition:"border-color .2s"}}
                          onMouseEnter={e=>e.currentTarget.style.borderColor=BLUE}
                          onMouseLeave={e=>e.currentTarget.style.borderColor=BORDER}>
                          <span style={{fontSize:28}}>📷</span>
                          <span style={{fontSize:11,color:BLUE,fontWeight:700}}>Camera</span>
                          <input type="file" accept="image/*" capture="environment" onChange={e=>handleCapture(e,"photo")} style={{display:"none"}}/>
                        </label>
                        <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"14px 20px",background:DEEP,border:`1.5px solid ${BORDER}`,borderRadius:12,cursor:"pointer",transition:"border-color .2s"}}
                          onMouseEnter={e=>e.currentTarget.style.borderColor=BLUE}
                          onMouseLeave={e=>e.currentTarget.style.borderColor=BORDER}>
                          <span style={{fontSize:28}}>🖼️</span>
                          <span style={{fontSize:11,color:DIM,fontWeight:700}}>Library</span>
                          <input type="file" accept="image/*" onChange={e=>handleCapture(e,"photo")} style={{display:"none"}}/>
                        </label>
                      </div>
                    </div>
                  )}
                  {loading&&(
                    <div style={{textAlign:"center",padding:"20px 0"}}>
                      <div style={{fontSize:28,marginBottom:8}}>🔍</div>
                      <div style={{fontSize:13,color:DIM}}>Analysing your meal...</div>
                    </div>
                  )}
                  {err&&<div style={{padding:"9px 12px",background:"#CE202914",borderRadius:8,border:`1px solid #CE202933`,fontSize:12,color:R,marginBottom:10}}>{err}</div>}
                  <PreviewCard/>
                  <button onClick={resetForm} style={{width:"100%",marginTop:8,padding:"10px",background:DEEP,border:`1px solid ${BORDER}`,borderRadius:9,color:FAINT,fontSize:12,fontFamily:"inherit",cursor:"pointer"}}>Cancel</button>
                </div>
              )}

              {/* ── Barcode Scan mode ── */}
              {(mode==="barcode"&&editId===null)&&(
                <div>
                  {camStatus==="idle"&&!preview&&(
                    <div style={{textAlign:"center",padding:"16px 0 10px"}}>
                      <div style={{fontSize:13,color:DIM,marginBottom:16,lineHeight:1.6}}>Point your camera at the barcode on the product packaging. Nova reads the code and pulls the nutrition data automatically.</div>
                      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                        <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"14px 20px",background:DEEP,border:`1.5px solid ${BORDER}`,borderRadius:12,cursor:"pointer",transition:"border-color .2s"}}
                          onMouseEnter={e=>e.currentTarget.style.borderColor=PURPLE}
                          onMouseLeave={e=>e.currentTarget.style.borderColor=BORDER}>
                          <span style={{fontSize:28}}>〠</span>
                          <span style={{fontSize:11,color:PURPLE,fontWeight:700}}>Scan Barcode</span>
                          <input type="file" accept="image/*" capture="environment" onChange={e=>handleCapture(e,"barcode")} style={{display:"none"}}/>
                        </label>
                        <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"14px 20px",background:DEEP,border:`1.5px solid ${BORDER}`,borderRadius:12,cursor:"pointer",transition:"border-color .2s"}}
                          onMouseEnter={e=>e.currentTarget.style.borderColor=PURPLE}
                          onMouseLeave={e=>e.currentTarget.style.borderColor=BORDER}>
                          <span style={{fontSize:28}}>🖼️</span>
                          <span style={{fontSize:11,color:DIM,fontWeight:700}}>Library</span>
                          <input type="file" accept="image/*" onChange={e=>handleCapture(e,"barcode")} style={{display:"none"}}/>
                        </label>
                      </div>
                    </div>
                  )}
                  {loading&&(
                    <div style={{textAlign:"center",padding:"20px 0"}}>
                      <div style={{fontSize:28,marginBottom:8}}>〠</div>
                      <div style={{fontSize:13,color:DIM}}>Reading barcode...</div>
                    </div>
                  )}
                  {err&&<div style={{padding:"9px 12px",background:"#CE202914",borderRadius:8,border:`1px solid #CE202933`,fontSize:12,color:R,marginBottom:10}}>{err}</div>}
                  <PreviewCard/>
                  <button onClick={resetForm} style={{width:"100%",marginTop:8,padding:"10px",background:DEEP,border:`1px solid ${BORDER}`,borderRadius:9,color:FAINT,fontSize:12,fontFamily:"inherit",cursor:"pointer"}}>Cancel</button>
                </div>
              )}

              {/* ── Manual entry (also used for editing) ── */}
              {(mode==="manual"||editId!==null)&&(
                <>
                  <input ref={nameRef} value={iname} onChange={e=>setIname(e.target.value)} placeholder="Item name" onKeyDown={e=>e.key==="Enter"&&addItem()} style={{...inpStyle(),marginBottom:10}}/>
                  <div style={{display:"flex",gap:8,marginBottom:8}}>
                    <div style={{flex:1}}><div style={{fontSize:9,color:FAINT,letterSpacing:1.5,marginBottom:3,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Calories</div><input value={ical} onChange={e=>setIcal(e.target.value)} placeholder="0" type="number" style={inpStyle()}/></div>
                    <div style={{flex:1}}><div style={{fontSize:9,color:FAINT,letterSpacing:1.5,marginBottom:3,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Water (oz)</div><input value={iwat} onChange={e=>setIwat(e.target.value)} placeholder="0" type="number" style={inpStyle()}/></div>
                  </div>
                  <div style={{display:"flex",gap:8,marginBottom:14}}>
                    <div style={{flex:1}}><div style={{fontSize:9,color:FAINT,letterSpacing:1.5,marginBottom:3,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Protein (g)</div><input value={iprot} onChange={e=>setIprot(e.target.value)} placeholder="0" type="number" style={inpStyle()}/></div>
                    <div style={{flex:1}}><div style={{fontSize:9,color:FAINT,letterSpacing:1.5,marginBottom:3,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Carbs (g)</div><input value={icarb} onChange={e=>setIcarb(e.target.value)} placeholder="0" type="number" style={inpStyle()}/></div>
                    <div style={{flex:1}}><div style={{fontSize:9,color:FAINT,letterSpacing:1.5,marginBottom:3,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Fat (g)</div><input value={ifat} onChange={e=>setIfat(e.target.value)} placeholder="0" type="number" style={inpStyle()}/></div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={resetForm} style={{flex:1,padding:"12px",background:DEEP,border:`1px solid ${BORDER}`,borderRadius:9,color:DIM,fontSize:13,fontFamily:"inherit",cursor:"pointer"}}>Cancel</button>
                    <button onClick={addItem} style={{flex:1,padding:"12px",background:R,border:"none",borderRadius:9,color:"#fff",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>{editId?"Update":"Add"}</button>
                  </div>
                </>
              )}
            </div>
          ):(
            <button onClick={()=>{setShowForm(true);setMode("smart");}} style={{width:"100%",padding:"14px",background:CARD,border:`1px dashed ${BORDER}`,borderRadius:12,color:DIM,fontSize:13,fontFamily:"inherit",cursor:"pointer",letterSpacing:.5,marginBottom:12}}>+ Log Food</button>
          )}

          {/* ── Quick-add water ── */}
          <div style={{marginBottom:8}}>
            <div style={{fontSize:9,color:FAINT,letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>Quick Add Water</div>
            <div style={{display:"flex",gap:8}}>
              {[8,12,16,24].map(oz=>(
                <button key={oz} onClick={()=>setItems([...items,{id:Date.now()+oz,name:`Water (${oz} oz)`,calories:0,protein:0,carbs:0,fat:0,water:oz,time:nowTime()}])} style={{flex:1,padding:"10px 0",background:DEEP,border:`1px solid #1A3A4A`,borderRadius:9,color:BLUE,fontSize:12,fontFamily:"inherit",cursor:"pointer",fontWeight:600}}>{oz} oz</button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── Nova Chat Tab ────────────────────────────────────────────────────────
    function NovaTab({plan,log,chatMsgs,setChatMsgs,inputRef}){
      const[chatInp,setChatInp]=useState("");
      const[chatBusy,setChatBusy]=useState(false);
      const endRef=useRef(null);const today=todayName();
      const chat=chatMsgs||[{role:"assistant",content:"Plan's locked in. Let's get to work — hit me up anytime you have questions or need a push. What's up?"}];
      useEffect(()=>{setTimeout(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),50);},[chat,chatBusy]);
      const sendChat=async()=>{
        const t=chatInp.trim();if(!t||chatBusy)return;
        setChatInp("");const nm=[...chat,{role:"user",content:t}];setChatMsgs(nm);setChatBusy(true);
        try{
          const ls=Object.entries(log).slice(-30).map(([k,v])=>`${k.split("__")[0]} ${v.weight?v.weight+"lbs":""} ${v.done?"✓":"✗"}`).join(", ");
          const rep=await ask(nm.slice(-14).map(m=>({role:m.role,content:m.content})),SYS_COACH(plan,today,ls),500);
          setChatMsgs([...nm,{role:"assistant",content:rep}]);
        }catch{setChatMsgs([...nm,{role:"assistant",content:"Connection issue — try again."}]);}
        setChatBusy(false);
      };
      return(
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,animation:"fadeUp .22s ease"}}>
          <div style={{flex:1,overflowY:"auto"}}>
            {chat.map((m,i)=><Bubble key={i} m={m}/>)}
            {chatBusy&&<Dots/>}
            <div ref={endRef} style={{height:8}}/>
          </div>
          <div style={{flexShrink:0,paddingTop:10,borderTop:`1px solid ${BORDER}`,marginTop:10}}>
            <div style={{display:"flex",gap:8}}>
              <input ref={inputRef} value={chatInp} onChange={e=>setChatInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="Ask Nova anything…" style={{flex:1,background:CARD,border:`1px solid ${BORDER}`,borderRadius:22,padding:"10px 16px",color:TXT,fontSize:14,outline:"none",fontFamily:"inherit"}}/>
              <button onClick={sendChat} disabled={!chatInp.trim()||chatBusy} style={{width:44,height:44,borderRadius:"50%",background:chatInp.trim()?R:CARD,border:"none",cursor:chatInp.trim()?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Dashboard Shell ──────────────────────────────────────────────────────
    function Dashboard({plan,setPlan,onReset,onAdjust}){
      const[tab,setTab]=useState("dashboard");
      const[log,setLog]=useLS("nv6_log",{});
      const[xp,setXp]=useLS("nv6_xp",0);
      const[prs,setPrs]=useLS("nv6_prs",{});
      const[bwLog,setBwLog]=useLS("nv6_bw",{});
      const[nutLog,setNutLog]=useLS("nv6_nut",{});
      const[chatMsgs,setChatMsgs]=useLS("nv6_chat",null);
      const[activeWorkoutDay,setActiveWorkoutDay]=useState(null);
      const[confetti,setConfetti]=useState(false);
      const chatInputRef=useRef(null);
      const today=todayName();
      const todayPlan=plan.weeklySchedule?.find(d=>d.day===today);

      useEffect(()=>{
        const sessionKey="nv6_session_"+dateKey();
        if(localStorage.getItem(sessionKey))return;
        localStorage.setItem(sessionKey,"1");
        const allDates=[...new Set(Object.keys(log).map(k=>k.split("__")[1]).filter(Boolean))].sort();
        if(!allDates.length)return;
        const lastDate=allDates[allDates.length-1];
        const dk=dateKey();
        if(lastDate===dk)return;
        const msGap=new Date(dk)-new Date(lastDate);
        const daysMissed=Math.round(msGap/(1000*60*60*24));
        if(daysMissed<2)return;
        const lastDayName=DAYS[new Date(lastDate).getDay()];
        setTimeout(async()=>{
          try{
            const msg=await ask([{role:"user",content:"Send the re-engagement message now."}],SYS_REENGAGE(plan,daysMissed,lastDayName,today),200);
            setChatMsgs(prev=>{
              const base=prev||[{role:"assistant",content:"Plan's locked in. Let's get to work — hit me up anytime. What's up?"}];
              return[...base,{role:"assistant",content:msg}];
            });
          }catch{}
        },800);
      },[]);

      const handleBeginWorkout=day=>setActiveWorkoutDay(day||todayPlan);
      const handleFinishWorkout=async()=>{
        setActiveWorkoutDay(null);setConfetti(true);setTimeout(()=>setConfetti(false),3500);
        const dk=dateKey();
        const completedSets=Object.keys(log).filter(k=>k.includes(`__${dk}__`)&&log[k].done).length;
        const newPRs=Object.entries(prs).map(([name,w])=>`${name}: ${w}lbs`);
        try{
          const msg=await ask([{role:"user",content:"Send the post-workout message now."}],SYS_POST_WORKOUT(plan,today,completedSets,newPRs),200);
          const curr=chatMsgs||[{role:"assistant",content:"Plan's locked in. Let's get to work!"}];
          setChatMsgs([...curr,{role:"assistant",content:msg}]);
        }catch{}
        setTab("dashboard");
      };

      const TABS=[
        {id:"dashboard",icon:"🏠",label:"Home"},
        {id:"workouts",icon:"💪",label:"Workouts"},
        ...(plan.includeNutrition&&plan.nutrition?[{id:"nutrition",icon:"🥗",label:"Nutrition"}]:[]),
        {id:"chat",icon:"💬",label:"Nova"},
      ];

      return(
        <div style={{display:"flex",flexDirection:"column",height:"100%",background:BG}}>
          <Confetti go={confetti}/>
          {activeWorkoutDay&&<WorkoutTracker day={activeWorkoutDay} log={log} setLog={setLog} xp={xp} setXp={setXp} prs={prs} setPrs={setPrs} onFinish={handleFinishWorkout} onExit={()=>setActiveWorkoutDay(null)}/>}
          <div style={{padding:"14px 18px 0",flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,letterSpacing:3,color:R,textTransform:"uppercase"}}>Nova Fitness</div>
                <div style={{fontSize:20,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:TXT}}>{today.toUpperCase()}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={onAdjust} style={{fontSize:11,fontWeight:600,color:R,background:"#CE202918",border:`1px solid #CE202955`,borderRadius:8,padding:"5px 11px",cursor:"pointer"}}>Adjust Plan</button>
                <ResetBtn onReset={onReset}/>
              </div>
            </div>
          </div>
          <TabBar tabs={TABS} active={tab} onChange={t=>{setTab(t);if(t==="chat")setTimeout(()=>chatInputRef.current?.focus(),100);}}/>
          <div style={{flex:1,overflowY:tab==="chat"?"hidden":"auto",padding:tab==="chat"?"11px 16px 0":"11px 16px 20px",display:"flex",flexDirection:"column",minHeight:0}}>
            {tab==="dashboard"&&<DashboardTab plan={plan} log={log} xp={xp} bwLog={bwLog} setBwLog={setBwLog} setXp={setXp} onBeginWorkout={()=>handleBeginWorkout(null)} onChatFocus={()=>{setTab("chat");setTimeout(()=>chatInputRef.current?.focus(),100);}} today={today}/>}
            {tab==="workouts"&&<WorkoutsTab plan={plan} log={log} prs={prs} today={today} onBeginWorkout={handleBeginWorkout}/>}
            {tab==="nutrition"&&plan.includeNutrition&&plan.nutrition&&<NutritionTab plan={plan} nutLog={nutLog} setNutLog={setNutLog} xp={xp} setXp={setXp}/>}
            {tab==="chat"&&<NovaTab plan={plan} log={log} chatMsgs={chatMsgs} setChatMsgs={setChatMsgs} inputRef={chatInputRef}/>}
          </div>
        </div>
      );
    }

    function App(){
      const[phase,setPhase]=useLS("nv6_phase","onboarding");
      const[plan,setPlan]=useLS("nv6_plan",null);
      const[resetKey,setResetKey]=useState(0);
      const reset=()=>{nukeAll();setPlan(null);setPhase("onboarding");setResetKey(k=>k+1);};
      return(
        <div style={{background:BG,height:"100vh",color:TXT,fontFamily:"'DM Sans',sans-serif",overflow:"hidden"}}>
          <div style={{maxWidth:480,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            {phase==="onboarding"&&<Chat key={resetKey} onDone={p=>{setPlan(p);setPhase("plan");}} onReset={reset}/>}
            {phase==="adjust"&&plan&&<Chat isAdjust existingPlan={plan} onDone={p=>{setPlan(p);setPhase("plan");}} onCancel={()=>setPhase("dashboard")} onReset={reset}/>}
            {phase==="plan"&&plan&&<PlanPreview plan={plan} onBegin={()=>setPhase("dashboard")} onAdjust={()=>setPhase("adjust")} onReset={reset}/>}
            {phase==="dashboard"&&plan&&<Dashboard plan={plan} setPlan={setPlan} onReset={reset} onAdjust={()=>setPhase("adjust")}/>}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
